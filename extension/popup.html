<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>CV Radar</title>
    <style>
      body {
        width: 300px;
        margin: 0;
        padding: 14px 14px 12px;
        font: 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        color: #0f172a;
        background: #fff;
      }
      h1 {
        margin: 0 0 6px;
        font-size: 14px;
        font-weight: 600;
      }
      p {
        margin: 0;
        color: #475569;
        line-height: 1.45;
      }
      .muted {
        color: #64748b;
        font-size: 11px;
        margin-top: 10px;
      }
      .fill-btn {
        display: block;
        width: 100%;
        margin-top: 10px;
        padding: 9px 12px;
        background: linear-gradient(135deg, #7c3aed 0%, #d946ef 60%, #ec4899 100%);
        color: #fff;
        border: 0;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }
      .fill-btn:hover { filter: brightness(1.05); }
      .fill-btn:disabled { opacity: 0.55; cursor: not-allowed; filter: none; }
      .status {
        margin-top: 8px;
        font-size: 11px;
        min-height: 14px;
        line-height: 1.4;
      }
      .status.ok { color: #15803d; }
      .status.err { color: #b91c1c; }
      .status.info { color: #64748b; }
      .origin-list {
        margin-top: 10px;
        padding: 8px 10px;
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 6px;
      }
      .origin-list code {
        display: block;
        font-size: 11px;
        color: #334155;
        word-break: break-all;
      }
      .origin-list code + code {
        margin-top: 4px;
      }
      .empty {
        color: #94a3b8;
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <h1>CV Radar Auto Apply</h1>
    <p>When the application form is visible on this page, click below to fill it with your CV.</p>

    <button id="fillBtn" class="fill-btn">Fill this form</button>
    <div id="status" class="status"></div>

    <div class="origin-list">
      <div class="muted" style="margin: 0 0 4px">Connected app origins</div>
      <div id="origins"><span class="empty">None detected yet. Open the app.</span></div>
    </div>
    <p class="muted">Forms are filled but not submitted. Review everything before you click submit.</p>
    <script src="popup.js"></script>
  </body>
</html>
